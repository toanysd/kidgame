<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="description" content="KidGame — Interactive Motion Game for Kids 3-5. Punch, kick, and slash fruits using your body!">
  <title>🎮 KidGame — Fruit Ninja Motion</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/fighter.css">
</head>
<body>

  <!-- ============ LOADING SCREEN ============ -->
  <div id="screen-loading" class="screen active">
    <div class="loading-container">
      <div class="loading-ring">
        <div class="ring-segment"></div>
        <div class="ring-segment"></div>
        <div class="ring-segment"></div>
      </div>
      <h2 class="loading-title">🧠 Loading AI Vision...</h2>
      <p class="loading-sub" id="loading-status">Preparing camera & body tracking</p>
    </div>
    <div class="floating-emojis" aria-hidden="true">
      <span class="float-emoji" style="--delay:0s;--x:10%">🍎</span>
      <span class="float-emoji" style="--delay:0.5s;--x:30%">🤖</span>
      <span class="float-emoji" style="--delay:1s;--x:50%">🍌</span>
      <span class="float-emoji" style="--delay:1.5s;--x:70%">🚂</span>
      <span class="float-emoji" style="--delay:2s;--x:90%">🍇</span>
    </div>
  </div>

  <!-- ============ MENU SCREEN ============ -->
  <div id="screen-menu" class="screen">
    <div class="menu-bg-particles" id="menu-particles" aria-hidden="true"></div>
    <div class="menu-content">
      <div class="logo-container">
        <h1 class="game-logo">
          <span class="logo-icon">🎮</span>
          <span class="logo-text">KidGame</span>
        </h1>
        <p class="logo-tagline">Move Your Body! / Vận Động Nào!</p>
      </div>

      <div class="game-cards">
        <button class="game-card card-ninja" id="btn-fruit-ninja" data-game="fruit-ninja">
          <div class="card-icon">🍎⚔️</div>
          <div class="card-info">
            <h3>Fruit Ninja Motion</h3>
            <p>Punch & Kick! / Đấm & Đá!</p>
          </div>
          <div class="card-badge">PLAY</div>
        </button>

        <button class="game-card card-fighter-ai" id="btn-fighter-ai" data-game="fighter-ai">
          <div class="card-icon">🤖🥊</div>
          <div class="card-info">
            <h3>Fighter vs AI</h3>
            <p>Fight the Robot! / Đánh Robot</p>
          </div>
          <div class="card-badge">PLAY</div>
        </button>

        <button class="game-card card-fighter-p2p" id="btn-fighter-p2p" data-game="fighter-p2p">
          <div class="card-icon">🤜🤛</div>
          <div class="card-info">
            <h3>Fighter 2 Player</h3>
            <p>Vs Friend / Đánh với bạn</p>
          </div>
          <div class="card-badge">PLAY</div>
        </button>
      </div>
    </div>
  </div>

  <!-- ============ GAME SCREEN ============ -->
  <div id="screen-game" class="screen">
    <!-- Camera feed (hidden source) -->
    <video id="camera-feed" autoplay playsinline muted></video>
    <!-- Game canvas overlay -->
    <canvas id="game-canvas"></canvas>

    <!-- HUD Overlay -->
    <div id="game-hud">
      <div class="hud-left">
        <div class="hud-score">
          <span class="hud-label">Score</span>
          <span class="hud-value" id="hud-score">0</span>
        </div>
        <div class="hud-combo" id="hud-combo"></div>
      </div>
      <div class="hud-center">
        <div class="hud-countdown" id="hud-countdown"></div>
      </div>
      <div class="hud-right">
        <div class="hud-timer">
          <span class="hud-label">Time</span>
          <span class="hud-value" id="hud-timer">60</span>
        </div>
        <div class="hud-strikes" id="hud-strikes"></div>
      </div>
    </div>

    <!-- Game Controls -->
    <div class="game-controls">
      <button id="btn-home" class="btn-circle" title="Back to Menu">🏠</button>
      <button id="btn-pause" class="btn-circle" title="Pause">⏸️</button>
    </div>
  </div>

  <!-- ============ RESULTS SCREEN ============ -->
  <div id="screen-results" class="screen">
    <div class="results-container">
      <div class="results-stars" id="results-stars"></div>
      <h2 class="results-title" id="results-title">Great Job! 🎉</h2>
      <p class="results-subtitle" id="results-subtitle">Giỏi lắm con!</p>

      <div class="results-stats">
        <div class="stat-card">
          <span class="stat-icon">🎯</span>
          <span class="stat-value" id="stat-score">0</span>
          <span class="stat-label">Score / Điểm</span>
        </div>
        <div class="stat-card">
          <span class="stat-icon">🔥</span>
          <span class="stat-value" id="stat-combo">0</span>
          <span class="stat-label">Best Combo</span>
        </div>
        <div class="stat-card">
          <span class="stat-icon">⚡</span>
          <span class="stat-value" id="stat-hits">0</span>
          <span class="stat-label">Hits / Lần đánh</span>
        </div>
      </div>

      <div class="results-actions">
        <button class="btn-primary btn-large" id="btn-play-again">
          🔄 Play Again / Chơi lại
        </button>
        <button class="btn-secondary btn-large" id="btn-back-menu">
          🏠 Menu
        </button>
      </div>
    </div>

    <div class="confetti-container" id="confetti" aria-hidden="true"></div>
  </div>

  <!-- ============ SCRIPTS (ES Modules) ============ -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
